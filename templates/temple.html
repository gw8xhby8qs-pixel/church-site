<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Символизм храма</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* кнопка домой */
        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }
        .home-btn img {
            width: 60px;
            cursor: pointer;
        }

      /* верхние кнопки-сцены */
.top-buttons {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    z-index: 1000;
}

.scene-btn {
    width: 140px;
    height: 80px;
    cursor: pointer;
    border-radius: 10px;
    overflow: hidden;
    border: 3px solid white;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
    transition: transform 0.3s;
    display: flex;          /* фиксирует размер контейнера */
    align-items: center;
    justify-content: center;
    background-color: #000; /* временный фон, если картинка не загрузилась */
}

.scene-btn:hover {
    transform: scale(1.08);
}

.scene-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;         /* ключевой момент — чтобы картинка не исчезала */
}


        /* маркеры */
        .marker {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #FFD700;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 1500;
        }
        .marker::after {
            content: "";
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255,215,0,0.7);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: translate(-50%,-50%) scale(0.6); opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
        }

        /* всплывающая подсказка */
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            max-width: 220px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 2000;
        }
        body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;

    /* Фон под всё */
    background-image: url("/static/images/bg.jpg"); /* твоя картинка */
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}
        .home-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 1000;

    display: flex;
    align-items: center;
    justify-content: center;

    width: 120px;       /* ширина */
    height: 40px;       /* высота */
    background-color: #4B2E2B; /* тёмно-коричневый */
    color: white;       /* текст белый */
    font-weight: bold;
    font-size: 16px;
    text-decoration: none;
    border-radius: 8px;  /* скругление углов */
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

    .home-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 12px rgba(0,0,0,0.5);
}
    .marker {
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #FFD700;
    cursor: pointer;
    transform: translate(-50%, -50%);
    z-index: 1500;
    pointer-events: all; /* важно */
}

    .tooltip {
    position: absolute;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    max-width: 500px;
    max-height: 500px;
    overflow-y: auto;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 2000;
}
        .scene {

    position: relative;

    display: flex;
    justify-content: center;
    align-items: center;

    margin: 120px auto 40px auto;

    padding: 12px;

    width: fit-content;
    height: fit-content;

    border: 8px double gold;
    border-radius: 14px;

    background: rgba(0,0,0,0.35);

    box-shadow:
        0 0 25px rgba(255,215,0,0.4),
        0 15px 40px rgba(0,0,0,0.6);
}

#sceneImage {

    display: block;

    max-width: 90vw;
    max-height: 80vh;

    border-radius: 6px;

    margin: auto;
}
    </style>
</head>
<body>

<a href="/" class="home-btn">Домой</a>

<!-- кнопки сцен -->
<div class="top-buttons">
    <div class="scene-btn" onclick="setScene('outside')">
        <img src="/static/images/btn_outside.jpg" alt="Внешняя часть">
    </div>
    <div class="scene-btn" onclick="setScene('inside')">
        <img src="/static/images/btn_inside.jpg" alt="Внутренняя часть">
    </div>
    <div class="scene-btn" onclick="setScene('altar')">
        <img src="/static/images/btn_altar.jpg" alt="Алтарь">
    </div>
</div>

<!-- фон сцены -->
<div id="scene" class="scene">
    <img id="sceneImage">
</div>
<div id="tooltip" class="tooltip"></div>

<script>
    const scenes = {
        outside: {
            bg: "/static/images/temple_outside.jpg",
            markers: [
                {top:"26%", left:"50%", text:"Глава (купол) храма. Количество глав храма раскрывает в числовой символике иерархию устроения небесной Церкви. Одна глава знаменует единство Бога. Две главы соответствуют двум естествам Богочеловека Иисуса Христа. Три главы знаменуют Святую Троицу. Четыре главы обозначают Четвероевангелие и его распространение на четыре стороны света. Пять глав обозначают Господа Иисуса Христа и четырех евангелистов. Семь глав знаменуют семь таинств Церкви, семь даров Святого Духа, семь Вселенских соборов. Девять глав связаны с образом небесной Церкви, состоящей из девяти чинов ангелов и девяти чинов праведников. Тринадцать глав – знамение Господа Иисуса Христа и двенадцати апостолов. Двадцать пять глав могут быть знамением апокалиптического видения престола Святой Троицы и двадцати четырех старцев (Откр. 11, 15–18) или обозначать похвалу Пресвятой Богородице (25 икосов и кондаков древнейшего акафиста Богородице), в зависимости от посвящения храма. Тридцать три главы – число земных лет Спасителя. Количество глав связано с посвящением главного престола храма, а также часто и с количеством престолов, соединенных в одном объеме."},
                {top:"18%", left:"50%", text:"Крест – главный христианский символ. Поклоняясь образу креста, мы видим в нем прежде всего символ Самого Христа и символ того крестного пути, который Он заповедовал нам: «Если кто хочет идти за Мною, отвергнись себя, и возьми крест свой, и следуй за Мною». Вид креста указывает и на таинство Троицы: своей вертикалью он указует нам на Высочайшего Отца, поперечной перекладиной – на Сына и Святого Духа, ибо Давид говорит: «Руце Твои сотвористе мя, и создасте мя, то есть создал Сын и Святой Дух»"},
                {top:"50%", left:"40%", text:"Стены. Сближая Церковь, живой храм Божий, с самим зданием храма, св. Иоанн Златоуст учит, что каждый из верующих и все вместе есть храм, и все народы суть четыре стены, из которых Христос создал единый храм. Сходные воззрения на храм можно найти и у западных богословов. Петр Карнатский (XII в.) рассматривает храм как образ мира. «В основании, – писал он, – полагается камень с изображением храма и 12 других камней, в ознаменование того, что Церковь покоится на Христе и 12 апостолах. Стены означают народы; их четыре, потому что они принимают сходящихся с четырех сторон»"},
                {top:"77%", left:"40%", text:"Цоколь — это основание здания. Цоколь лежащая на фундаменте нижняя, обычно немного выступающая, утолщенная часть наружной стены здания. Обычно его декорируют. Цоколь может быть ступенчатым, и тогда его называют стереобатом, а его верхнюю ступень стилобатом. Цоколь приподнимает храм над землей, надо подняться по ступеням, чтобы войти в него. Это тоже символ. Символ надмирности храма. Устремление в горние сферы.Ступени – символ духовного восхождения, лествицы Иаковлевой."},
                {top:"70%", left:"55%", text:"Порталы, т. е. входы рассматриваемых нами храмов имеют перспективную форму, они обрамлены понижающими арками, которые зрительно притягивают нас внутрь храма. Такие перспективные потралы напоминают нам о соборности нашей церкви, о том, что она созывает, собирает своих чад. Над западным порталом в церкви традиционно располагается икона, по которой мы можем определить какому празднику посвящена церковь или во имя какого святого она воздвигнута. Входной перспективный портал, широко раскрытый навстречу идущим в храм и призывающий всех войти, резко сужается к двери, как бы напоминая своим устройством евангельские слова Господа: «Входите тесными вратами, потому, что широки врата и пространен путь, ведущие в погибель, и многие идут ими; потому что тесны врата и узок путь, ведущие в жизнь, и немногие находят их (Мф. 7:13-14)."},
                {top:"40%", left:"51%", text:"Колокольня. Над входом в храм, а иногда рядом с храмом, строится колокольня или звонница, то есть башня, на которой висят колокола. Колокольный звон употребляется для того, чтобы созывать верующих на молитву, и ещё для того, чтобы возвещать о важнейших частях совершаемой в храме службы. Звон в один колокол называется «благовест» (благостная, радостная весть о богослужении). Звон во все колокола, выражающий христианскую радость, например, по поводу торжественного праздника, называется «трезвон». Звон колоколов по поводу печального события называется «перезвон». Колокольный звон напоминает нам о вышнем, небесном мире."}


            ]
        },
        inside: {
            bg: "/static/images/temple_inside.jpg",
            markers: [
                {top:"52%", left:"58%", text:"Иконостас – особая перегородка, со стоящими на ней иконами, отделяющая алтарь от средней части храма. Уже в катакомбных храмах Древнего Рима существовали решетки, отделяющие пространство алтаря от средней части храма. Появившийся на их месте в процессе развития православного храмоздательства иконостас является совершенствованием и углублением этой традиции."},
                {top:"70%", left:"50%", text:"Царские врата – двустворчатые, самые большие врата – располагаются в середине иконостаса и называются так, потому что через них Сам Господь Иисус Христос, Царь Славы, невидимо проходит в Святых Дарах. Через Царские врата никому кроме священнослужителей, и то только в определенные моменты богослужения, проходить не разрешается. За Царскими вратами, внутри алтаря, висит завеса (катапета́сма), которая отдергивается и задергивается в моменты, определенные Уставом и знаменует собой вообще покров тайны, покрывающий святыни Божии. На Царских вратах изображаются иконы Благовещения Пресвятой Богородицы и четырех Апостолов, которые написали Евангелия: Матфея, Марка, Луки и Иоанна. Над ними помещается образ Тайной Вечери, который указывает также, что за Царскими вратами в алтаре происходит то же самое, что происходило в Сионской горнице. Направо от Царских врат всегда помещается икона Спасителя, а налево от Царских врат – икона Божией Матери."},
                {top:"75%", left:"39%", text:"Северная дверь, на которой изображаются либо архангел Гавриил, либо диакон Филипп (архидиакон Лаврентий), либо пророк Моисей."},
                {top:"75%", left:"61%", text:"Южная дверь, на которой изображается либо архангел Михаил, либо архидиакон Стефан, либо первосвященник Аарон."},
                {top:"75%", left:"58%", text:"Первой справа от образа Спасителя, между ним и изображением на южной двери всегда должна быть храмовая икона, т. е. икона того праздника или святого, в честь которого освящен храм."},
                {top:"64%", left:"44%", text:"Во втором ярусе помещаются иконы важнейших двунадеся́тых праздников, изображающих те священные события, которые послужили спасению людей (праздничный ряд)."},
                {top:"50%", left:"50%", text:"Третий (деису́сный) ряд икон имеет своим центром образ Христа Вседержителя, восседающего на троне. По правую руку от Него изображается Пресвятая Дева Мария, молящая Его о прощении человеческих грехов, по левую руку от Спасителя – образ проповедника покаяния Иоанна Предтечи. Эти три иконы носят название деи́сис – моление (разг. деису́с) С обеих сторон от деисиса – иконы апостолов."},
                {top:"41%", left:"50%", text:"В центре четвертого (пророческого) ряда иконостаса изображается Матерь Божия с Богомладенцем. По обе стороны от Нее изображены предвозвестившие Ее и рожденного от Нее Искупителя ветхозаветные пророки (Исайя, Иеремия, Даниил, Давид, Соломон и другие)."},
                {top:"78%", left:"50%", text:"В центре храма, перед Царскими вратами, всегда лежит икона, посвященная текущему литургическому дню или ближайшему крупному празднику."},
                {top:"83%", left:"35%", text:"Солея́ (греч. возвышение посреди храма). Это возвышение может иметь одну или несколько ступеней. В таком устройстве солеи таится удивительный смысл. Алтарь не оканчивается на самом деле иконостасом, а выходит из-под него к людям, давая возможность понять очевидное: для молящихся, стоящих в храме, во время богослужения совершается то же, что совершается в алтаре."},
                {top:"83%", left:"47%", text:"Полукруглый выступ в центре солеи называется амво́ном (греч. восхожу). С амвона верующих причащают святых Христовых Таин, оттуда священник произносит самые значительные слова при совершении службы, а также проповеди. Символические значения амвона следующие: гора, с которой проповедовал Христос; Вифлеемская пещера, где он родился; камень, с которого Ангел возвестил женам о Воскресении Христа."},
                {top:"77%", left:"70%", text:"По краям солеи устраивают особо огороженные места для певцов и чтецов, называемые клиросами. Это слово происходит от названия певчих-священников «клирошане», то есть певчих из числа священнослужителей, кли́ра (греч. жребий, надел). Рядом с клиросами ставятся хору́гви – иконы, написанные на материи и прикрепленные, подобно запрестольным изображениям Креста и Божией Матери, к длинным древкам. Они используются во время крестных ходов. В некоторых храмах есть хо́ры – балкон или лоджия обычно с западной, реже с южной или с северной стороны."}
            ]
        },
        altar: {
            bg: "/static/images/temple_altar.jpg",
            markers: [
                {top:"70%", left:"55%", text:"Престол представляет собой деревянный (иногда мраморный или металлический) стол, утвержденный на четырех «столпах» (т. е. ножках, высота которых – 98 сантиметров, а со столешницей – 1 метр). Он расположен напротив Царских врат (ворот, расположенных в центре иконостаса) и является самым святым местом храма, местом, где Христос действительно особым образом присутствует в Святых Дарах."},
                {top:"50%", left:"43%", text:"Выносная икона Божией Матери"},
                {top:"50%", left:"54%", text:"Запрестольный Крест"},
                {top:"62%", left:"48%", text:"Дарохрани́тельница – особый сосуд, изготовленный обычно из не окисляющегося, вызолоченного металла, имеющий вид храма или часовни, с небольшой гробницей. Внутри дарохранительницы в особом ящичке кладутся приготовленные для длительного хранения частицы Тела Христова, пропитанные Его Кровью. Эти частицы употребляются для причащения на дому тяжелобольных и умирающих людей. Символически дарохранительница изображает собой Гроб Христов, в котором покоилось Его Тело, или Церковь, как постоянно питающую православных Телом и Кровью Господней."},
                {top:"65%", left:"20%", text:"В северо-восточной части алтаря, слева от Престола (если смотреть из храма), у стены находится жертвенник. По внешнему устройству жертвенник почти во всем подобен Престолу (это не касается священных предметов, на нем помещаемых). В первую очередь это относится к размерам жертвенника, которые бывают или одинаковы с размерами Престола или несколько меньше. Высота жертвенника всегда равна высоте Престола. Все те одежды, которые присутствуют на Престоле, есть и на жертвеннике: срачица, индития, покрывало. Название жертвенник это место алтаря получило оттого, что на нем совершается проскомидия, первая часть Божественной литургии, где хлеб в виде просфор и вино особым образом приготавливаются для совершения Таинства Бескровной Жертвы."},
                {top:"30%", left:"47%", text:"Разное количество окон в алтаре символизирует следующее: 1. Три окна (или два раза по три: вверху и внизу) – несозданный Троический свет Божества. 2. Три вверху и два внизу – Троический свет и два естества Господа Иисуса Христа. 3. Четыре окна – Четвероевангелие."},
                {top:"50%", left:"50%", text:"Вплотную к Престолу, с его восточной (дальней, если смотреть из храма, стороны) обычно помещается семисвечник, представляющий собой разделенный на семь ответвлений светильник, на котором находятся семь лампад, зажигаемых при богослужении. Символизируют эти лампады семь Церквей, которые видел в Откровении Иоанн Богослов, и семь Таинств Православной Церкви."},
            ]
        }
    };

    const sceneDiv = document.getElementById("scene");
    const tooltip = document.getElementById("tooltip");

    function setScene(name){
        const scene = scenes[name];
        document.getElementById("sceneImage").src = scene.bg;

        // удаляем старые маркеры
        document.querySelectorAll(".marker").forEach(m => m.remove());

        // создаём маркеры для текущей сцены
        scene.markers.forEach(m => {
            const marker = document.createElement("div");
            marker.className = "marker";
            marker.style.top = m.top;
            marker.style.left = m.left;
            marker.dataset.text = m.text;
            marker.style.position = "absolute";
            marker.style.width = "18px";
            marker.style.height = "18px";
            marker.style.background = "#FFD700";
            marker.style.borderRadius = "50%";
            marker.style.cursor = "pointer";
            marker.style.zIndex = 1500;
            sceneDiv.appendChild(marker);

            // обработчики
            marker.addEventListener("mouseenter", e => {
                tooltip.innerText = marker.dataset.text;
                tooltip.style.opacity = 1;
                tooltip.style.transform = "translateY(0)";
            });
            marker.addEventListener("mousemove", e => {
                tooltip.style.left = e.pageX + 15 + "px";
                tooltip.style.top = e.pageY + 15 + "px";
            });
            marker.addEventListener("mouseleave", e => {
                tooltip.style.opacity = 0;
                tooltip.style.transform = "translateY(10px)";
            });
        });
    }

    // стартовая сцена
    setScene("outside");
</script>

</body>
</html>
