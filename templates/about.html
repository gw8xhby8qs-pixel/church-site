<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>О проекте</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora&display=swap" rel="stylesheet">
    <style>
        /* -------------- Базовый фон и шрифты -------------- */
        body {
            margin: 0;
            padding: 0;
            background: url('{{ url_for("static", filename="backgrounds/stained_glass.jpg") }}') no-repeat center center fixed;
            background-size: cover;
            color: #f5f5f5;
            font-family: 'Lora', serif;
            overflow-x: hidden;
            position: relative;
        }

        /* -------------- Полупрозрачная подложка для текста -------------- */
        .container {
            text-align: center;
            padding: 100px 20px;
            position: relative;
            z-index: 2;
        }

        /* -------------- Заголовок -------------- */
        h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 4em;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        /* -------------- Блок текста -------------- */
        .text-block {
            background: rgba(0,0,0,0.7); /* чуть темнее для лучшей читаемости */
            display: inline-block;
            padding: 50px 40px;
            max-width: 900px;
            border-radius: 25px;
            line-height: 1.8;
            font-size: 1.2em;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            position: relative;
        }

        /* -------------- Крестик с дымом -------------- */
        .cross-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .cross-container img {
            width: 100px;
            height: auto;
        }

        .smoke {
            position: absolute;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            background: url('{{ url_for("static", filename="icons/smoke.gif") }}') no-repeat center/contain;
            pointer-events: none;
            animation: rise 6s infinite linear;
        }

        @keyframes rise {
            0% { transform: translateX(-50%) translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateX(-50%) translateY(-50px) rotate(5deg); opacity: 0.6; }
            100% { transform: translateX(-50%) translateY(-100px) rotate(-5deg); opacity: 0; }
        }

        /* -------------- Мерцающие свечи по всей странице -------------- */
        .candle {
            position: fixed;
            bottom: 20px;
            width: 12px;
            height: 50px;
            background: gold;
            border-radius: 6px;
            box-shadow: 0 0 20px gold, 0 0 40px gold;
            animation: flicker 1.5s infinite alternate;
        }

        .candle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .candle:nth-child(2) { left: 20%; animation-delay: 0.3s; }
        .candle:nth-child(3) { left: 30%; animation-delay: 0.6s; }
        .candle:nth-child(4) { left: 70%; animation-delay: 0.2s; }
        .candle:nth-child(5) { left: 80%; animation-delay: 0.5s; }

        @keyframes flicker {
            0% { box-shadow: 0 0 10px gold, 0 0 20px gold; height: 50px; }
            50% { box-shadow: 0 0 25px gold, 0 0 50px gold; height: 55px; }
            100% { box-shadow: 0 0 15px gold, 0 0 30px gold; height: 52px; }
        }

        /* -------------- Дополнительный дымовой фон -------------- */
        .background-smoke {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('{{ url_for("static", filename="backgrounds/smoke_overlay.png") }}') repeat;
            opacity: 0.15;
            z-index: 1;
            animation: smokeMove 30s linear infinite;
        }

        @keyframes smokeMove {
            0% { background-position: 0 0; }
            100% { background-position: 500px 0; }
        }

        /* -------------- Кнопка "Домой" -------------- */
        .home-button {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: #5C4033;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
            z-index: 999;
        }

        .home-button:hover {
            background-color: #4B3621;
            transform: scale(1.05);
        }

        /* -------------- Кнопка PayPal -------------- */
        .paypal-link {
            display: inline-block;
            margin: 15px 0;
            background-color: #0070ba;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .paypal-link:hover {
            background-color: #005c99;
        }
    </style>
</head>
<body>

<!-- Дополнительный дымовой слой -->
<div class="background-smoke"></div>

<!-- Мерцающие свечи -->


<!-- Кнопка Домой -->
<div class="home-button-container">
    <a href="{{ url_for('home') }}">
        <button class="home-button">Домой</button>
    </a>
</div>

<div class="container">
    <div class="cross-container">
        <img src="{{ url_for('static', filename='icons/small_cross.png') }}" alt="крест">
        <div class="smoke"></div>
    </div>

    <h1>О проекте</h1>

    <div class="text-block">
        <p>Проект носит образовательно-информативный характер.</p>
        <p>
            Поддержать разработчика можно через PayPal:
            <a href="https://www.paypal.com/donate/?hosted_button_id=MG5MRRA3ZLLD6" target="_blank" class="paypal-link">
                Поддержать проект
            </a>
        </p>
        <p>Поминайте раба Божия Вячеслава в своих молитвах!</p>
        <p>«Любовь выше всех добродетелей». — Преподобный Исаак Сирин</p>
    </div>
</div>

</body>
</html>
